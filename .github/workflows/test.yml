name: Manual Tests

on:
  push:
    branches: [ github-setup ]
  workflow_dispatch:

jobs:

  java-tests:
    name: Java Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: Run Java tests
        run: mvn -f java/pom.xml test

  cpp-tests:
    name: C++ Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ libgtest-dev libxxhash-dev cmake

          # build gtest (required on ubuntu)
          cd /usr/src/gtest
          sudo cmake .
          sudo make
          sudo cp lib/*.a /usr/lib

      - name: Run C++ tests
        run: |
          cd cpp/test
          make clean run

  interop-tests:
    name: Interop Tests
    runs-on: ubuntu-latest

    needs: [java-tests, cpp-tests]  # optional dependency

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10.0

      - name: Install Python deps
        run: |
          cd interop_tests
          pip install -r requirements.txt

      - name: Run interop tests
        run: |
          cd interop_tests
          source venv/bin/activate
          make clean all
